<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破阵子赏析游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "STKaiti", "SimSun", serif;
        }
        
        body {
            background-color: #6b4f37;
            color: #333;
            min-height: 100vh;
            padding: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,0 L100,0 L100,100 Z" fill="%235a3d29" opacity="0.1"/></svg>');
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: rgba(255, 248, 240, 0.92);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #8b7355;
        }
        
        header {
            background: linear-gradient(to right, #3c5b3c, #4a6c4a);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #8b7355;
        }
        
        h1 {
            color: #f5e8d0;
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav-btn {
            background-color: #5a8c7d;
            color: #f5e8d0;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .nav-btn:hover {
            background-color: #4a7668;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        .main-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-title {
            text-align: center;
            font-size: 2.2rem;
            color: #5a3d29;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #8b7355;
            width: 100%;
        }
        
        .instructions {
            background-color: rgba(139, 115, 85, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #8b7355;
            font-size: 1.2rem;
            color: #5a3d29;
            width: 100%;
            text-align: center;
        }
        
        .game-section {
            width: 100%;
            margin-bottom: 50px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid #c9b18b;
        }
        
        .section-title {
            color: #5a3d29;
            font-size: 1.8rem;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid #8b7355;
            text-align: center;
        }
        
        .section-title-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .matching-game {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            min-height: 400px;
        }
        
        .poem-side, .appreciation-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .poem-item, .appreciation-item {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #8b7355;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.2rem;
            position: relative;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .poem-item {
            color: #5a3d29;
            font-weight: bold;
        }
        
        .appreciation-item {
            color: #5a3d29;
        }
        
        .poem-item:hover, .appreciation-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }
        
        .poem-item.selected {
            background-color: rgba(139, 115, 85, 0.2);
            border-color: #c62828;
            color: #c62828;
        }
        
        .appreciation-item.selected {
            background-color: rgba(139, 115, 85, 0.2);
            border-color: #2e7d32;
            color: #2e7d32;
        }
        
        .poem-item.correct, .appreciation-item.correct {
            background-color: rgba(46, 125, 50, 0.2);
            border-color: #2e7d32;
        }
        
        .poem-item.incorrect, .appreciation-item.incorrect {
            background-color: rgba(198, 40, 40, 0.2);
            border-color: #c62828;
            animation: shake 0.5s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .poem-item.matched, .appreciation-item.matched {
            opacity: 0.6;
            cursor: default;
            border-style: dashed;
        }
        
        .poem-item.matched:hover, .appreciation-item.matched:hover {
            transform: none;
            box-shadow: none;
        }
        
        .message {
            margin-top: 20px;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.3rem;
            text-align: center;
            display: none;
            width: 100%;
        }
        
        .success {
            background-color: rgba(46, 125, 50, 0.2);
            color: #2e7d32;
            border: 1px solid #2e7d32;
            display: block;
        }
        
        .error {
            background-color: rgba(198, 40, 40, 0.2);
            color: #c62828;
            border: 1px solid #c62828;
            display: block;
        }
        
        .appreciation-bubble {
            position: fixed;
            background-color: #f5e8d0;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 3px solid #8b7355;
            z-index: 1000;
            max-width: 600px;
            display: none;
            animation: bubbleAppear 0.5s ease;
        }
        
        @keyframes bubbleAppear {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .bubble-title {
            color: #5a3d29;
            font-size: 1.5rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #8b7355;
            text-align: center;
        }
        
        .bubble-content {
            color: #5a3d29;
            font-size: 1.2rem;
            line-height: 1.6;
        }
        
        .close-bubble {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            color: #8b7355;
            cursor: pointer;
        }
        
        .emotion-game {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        .emotion-item {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #8b7355;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .emotion-question {
            color: #5a3d29;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .emotion-answer {
            color: #5a3d29;
            font-size: 1.2rem;
            line-height: 1.6;
            display: none;
            padding-top: 15px;
            border-top: 1px dashed #8b7355;
            animation: fadeIn 0.5s ease;
        }
        
        .emotion-item.active .emotion-answer {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .reset-btn {
            background-color: #8b7355;
            color: #f5e8d0;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .reset-btn:hover {
            background-color: #6b4f37;
            transform: translateY(-2px);
        }
        
        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(60, 91, 60, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid #c9aa4f;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .music-control:hover {
            transform: scale(1.1);
            background: rgba(60, 91, 60, 1);
        }
        
        .music-control i {
            color: #e9d6a7;
            font-size: 1.2rem;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #f5e8d0;
            background-color: #3c5b3c;
            border-top: 1px solid #8b7355;
        }
        
        @media (max-width: 900px) {
            .matching-game {
                flex-direction: column;
            }
            .poem-side, .appreciation-side {
                width: 100%;
            }
            h1 {
                font-size: 2.2rem;
            }
            .nav-buttons {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .nav-btn {
                width: 90%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>破阵子·赏析游戏</h1>
            <div class="nav-buttons">
                <a href="主页.html" class="nav-btn"><i class="fas fa-home"></i> 首页</a>
                <a href="填词.html" class="nav-btn"><i class="fas fa-gamepad"></i> 填词</a>
                <a href="翻译.html" class="nav-btn"><i class="fas fa-language"></i> 翻译</a>
                <a href="赏析.html" class="nav-btn"><i class="fas fa-book-open"></i> 赏析</a>
                <a href="典故.html" class="nav-btn"><i class="fas fa-landmark"></i> 典故</a>
            </div>
        </header>
        
        <main class="main-content">
            <h2 class="game-title">《破阵子·为陈同甫赋壮词以寄之》赏析游戏</h2>
            
            <div class="instructions">
                <p><i class="fas fa-info-circle"></i> <strong>游戏一：连线匹配</strong> 点击左侧诗句，然后点击右侧正确的赏析角度进行连线。匹配错误会重置游戏</p>
                <p><i class="fas fa-info-circle"></i> <strong>游戏二：情感分析</strong> 点击三个核心情感，查看详细解释。</p>
            </div>
            
            <section class="game-section">
                <div class="section-title-container">
                    <h3 class="section-title">游戏一：诗句与赏析角度连线</h3>
                    <button class="reset-btn" id="resetBtn">重置游戏</button>
                </div>
                
                <div class="matching-game">
                    <div class="poem-side" id="poemSide"></div>
                    <div class="appreciation-side" id="appreciationSide"></div>
                </div>
                
                <div class="message" id="matchingMessage"></div>
            </section>
            
            <section class="game-section">
                <h3 class="section-title">游戏二：核心情感分析</h3>
                <div class="emotion-game" id="emotionGame"></div>
            </section>
            
            <div class="appreciation-bubble" id="appreciationBubble">
                <div class="close-bubble" id="closeBubble">×</div>
                <h4 class="bubble-title" id="bubbleTitle">完整赏析</h4>
                <div class="bubble-content" id="bubbleContent"></div>
            </div>
        </main>
        
        <footer>
            <p>古风赏析游戏 | 破阵子·为陈同甫赋壮词以寄之 | 离线可用</p>
        </footer>
    </div>

    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicControl">
        <i class="fas fa-music" id="musicIcon"></i>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto" style="display: none;">
        <source src="音乐/游戏背景音乐_耳聆网_[声音ID：44022].mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========= 音效管理 =========
        const SoundFX = {
            correctAudio: null,
            wrongAudio: null,
            cheerAudio: null,
            bgAudio: null,
            isBgPlaying: false,
            
            init: function() {
                this.correctAudio = new Audio();
                this.correctAudio.src = "音乐/对勾，答对——综艺_耳聆网_[声音ID：36966].mp3";
                this.correctAudio.volume = 0.5;
                
                this.wrongAudio = new Audio();
                this.wrongAudio.src = "音乐/错误音效_耳聆网_[声音ID：36278].mp3";
                this.wrongAudio.volume = 0.5;
                
                this.cheerAudio = new Audio();
                this.cheerAudio.src = "https://www.soundjay.com/misc/sounds/applause-01.mp3";
                this.cheerAudio.volume = 0.3;
                
                this.bgAudio = document.getElementById('bgMusic');
                if (this.bgAudio) {
                    this.bgAudio.volume = 0.35;
                    this.bgAudio.loop = true;
                    
                    this.bgAudio.addEventListener('play', () => {
                        this.isBgPlaying = true;
                        document.getElementById('musicIcon').className = 'fas fa-music';
                        console.log('🎵 背景音乐播放中');
                    });
                    this.bgAudio.addEventListener('pause', () => {
                        this.isBgPlaying = false;
                        document.getElementById('musicIcon').className = 'fas fa-volume-mute';
                    });
                    
                    const playPromise = this.bgAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            console.log('⚠️ 自动播放被阻止，等待用户点击');
                            const startOnInteraction = () => {
                                this.bgAudio.play().catch(e => console.log('播放失败', e));
                                document.removeEventListener('click', startOnInteraction);
                                document.removeEventListener('touchstart', startOnInteraction);
                            };
                            document.addEventListener('click', startOnInteraction);
                            document.addEventListener('touchstart', startOnInteraction);
                        });
                    }
                }
            },
            
            playCorrect: function() {
                try {
                    this.correctAudio.currentTime = 0;
                    this.correctAudio.play().catch(e => console.log("正确音效播放失败", e));
                } catch(e) {}
            },
            
            playWrong: function() {
                try {
                    this.wrongAudio.currentTime = 0;
                    this.wrongAudio.play().catch(e => console.log("错误音效播放失败", e));
                } catch(e) {}
            },
            
            playCheer: function() {
                try {
                    this.cheerAudio.currentTime = 0;
                    this.cheerAudio.play().catch(e => console.log("欢呼音效播放失败", e));
                } catch(e) {}
            },
            
            toggleBgMusic: function() {
                if (this.isBgPlaying) {
                    this.bgAudio.pause();
                } else {
                    this.bgAudio.play().catch(e => console.log('播放失败', e));
                }
            }
        };

        // 诗句与赏析角度数据
        const matchingData = [
            {
                poem: "醉里挑灯看剑，梦回吹角连营",
                angle: "虚实结合、动作细节",
                fullAppreciation: "“醉里”与“梦回”对比，暗示现实压抑，唯有借酒与梦寄托抱负。“挑灯看剑”的细节，刻画出老将摩挲兵器的执着，无声胜有声。"
            },
            {
                poem: "八百里分麾下炙，五十弦翻塞外声",
                angle: "典故与视听渲染",
                fullAppreciation: "“八百里”（牛）和“五十弦”（瑟）的典故，以奢华意象烘托军营的慷慨豪迈。“分炙”“奏乐”的场景，从味觉与听觉强化将士同仇敌忾的氛围。"
            },
            {
                poem: "马作的卢飞快，弓如霹雳弦惊",
                angle: "比喻与动态描写",
                fullAppreciation: "“的卢马”典故赋予战马神速的传奇色彩，“霹雳”比喻弓弦声，瞬间定格战场杀伐之气。两句连用短促的节奏，模拟战斗的紧张激烈。"
            },
            {
                poem: "了却君王天下事，赢得生前身后名",
                angle: "直抒胸臆与儒家理想",
                fullAppreciation: "直白道出建功立业的终极追求，呼应屈原“忽奔走以先后兮，及前王之踵武”的家国情怀。“君王”二字隐含对南宋朝廷的复杂态度——既忠君，又暗讽其苟安。"
            },
            {
                poem: "可怜白发生",
                angle: "情感顿挫与象征",
                fullAppreciation: "白发是时间流逝的具象，象征理想被现实碾碎的残酷。结句戛然而止，余韵悠长，与李白“大道如青天，我独不得出”异曲同工。"
            }
        ];

        // 情感分析数据
        const emotionData = [
            {
                emotion: "报国豪情与壮志未酬的矛盾",
                explanation: "通过梦境中的雄壮军容（如'沙场秋点兵''马作的卢飞快'）展现收复河山的热血理想，又以'可怜白发生'的现实落差，凸显英雄迟暮的悲愤。"
            },
            {
                emotion: "理想与现实的剧烈冲突",
                explanation: "前九句极写胜利与功名，末一句陡转直下，形成'高开低走'的情感结构，强化了壮志难伸的沉痛。"
            },
            {
                emotion: "对战友的共情与激励",
                explanation: "此词寄赠陈同甫，既抒发自身苦闷，亦暗含对友人坚持抗金的鼓励，传递志同道合者的惺惺相惜。"
            }
        ];

        // 游戏状态
        let gameState = {
            selectedPoem: null,
            matches: [],
            completedMatches: 0,
            connectionLines: []
        };

        // 初始化音效
        SoundFX.init();

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', function() {
            initMatchingGame();
            initEmotionGame();
            setupEventListeners();
        });

        function initMatchingGame() {
            const poemSide = document.getElementById('poemSide');
            const appreciationSide = document.getElementById('appreciationSide');
            
            poemSide.innerHTML = '';
            appreciationSide.innerHTML = '';
            
            gameState.connectionLines.forEach(line => {
                if (line.parentNode) line.parentNode.removeChild(line);
            });
            gameState.connectionLines = [];
            gameState.selectedPoem = null;
            gameState.matches = [];
            gameState.completedMatches = 0;
            
            const shuffledAngles = [...matchingData].map(item => item.angle).sort(() => Math.random() - 0.5);
            
            matchingData.forEach((item, index) => {
                const poemItem = document.createElement('div');
                poemItem.className = 'poem-item';
                poemItem.id = `poem-${index}`;
                poemItem.textContent = item.poem;
                poemItem.dataset.index = index;
                poemSide.appendChild(poemItem);
            });
            
            shuffledAngles.forEach((angle, index) => {
                const appreciationItem = document.createElement('div');
                appreciationItem.className = 'appreciation-item';
                appreciationItem.id = `appreciation-${index}`;
                appreciationItem.textContent = angle;
                const originalIndex = matchingData.findIndex(d => d.angle === angle);
                appreciationItem.dataset.originalIndex = originalIndex;
                appreciationItem.dataset.angle = angle;
                appreciationSide.appendChild(appreciationItem);
            });
            
            setupMatchingEvents();
            document.getElementById('matchingMessage').style.display = 'none';
        }

        function setupMatchingEvents() {
            const poemItems = document.querySelectorAll('.poem-item');
            const appreciationItems = document.querySelectorAll('.appreciation-item');
            
            poemItems.forEach(item => {
                item.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index);
                    const isMatched = gameState.matches.some(match => match.poemIndex === index);
                    if (isMatched) return;
                    
                    poemItems.forEach(poem => poem.classList.remove('selected'));
                    this.classList.add('selected');
                    gameState.selectedPoem = { element: this, index: index };
                    appreciationItems.forEach(app => app.classList.remove('selected'));
                    showMessage('请选择右侧对应的赏析角度', 'info');
                });
            });
            
            appreciationItems.forEach(item => {
                item.addEventListener('click', function() {
                    if (!gameState.selectedPoem) {
                        showMessage('请先选择左侧的诗句', 'error');
                        return;
                    }
                    
                    const angle = this.dataset.angle;
                    const isAlreadyMatched = gameState.matches.some(match => match.angle === angle);
                    if (isAlreadyMatched) return;
                    
                    const appreciationIndex = parseInt(this.dataset.originalIndex);
                    const poemIndex = gameState.selectedPoem.index;
                    const isCorrect = matchingData[poemIndex].angle === angle;
                    
                    gameState.matches.push({
                        poemIndex: poemIndex,
                        appreciationIndex: appreciationIndex,
                        angle: angle,
                        correct: isCorrect,
                        poemElement: gameState.selectedPoem.element,
                        appreciationElement: this
                    });
                    
                    if (isCorrect) {
                        gameState.selectedPoem.element.classList.add('correct', 'matched');
                        this.classList.add('correct', 'matched');
                        gameState.completedMatches++;
                        // ✅ 正确匹配音效
                        SoundFX.playCorrect();
                        showMessage(`匹配正确！`, 'success');
                        setTimeout(() => {
                            showFullAppreciation(poemIndex);
                        }, 500);
                        
                        if (gameState.completedMatches === matchingData.length) {
                            setTimeout(() => {
                                showMessage('恭喜！所有连线匹配完成！', 'success');
                                SoundFX.playCheer();
                            }, 1000);
                        }
                    } else {
                        gameState.selectedPoem.element.classList.add('incorrect');
                        this.classList.add('incorrect');
                        // ❌ 错误匹配音效
                        SoundFX.playWrong();
                        showMessage('匹配错误，游戏重置！', 'error');
                        setTimeout(() => {
                            initMatchingGame();
                        }, 2000);
                    }
                    
                    gameState.selectedPoem.element.classList.remove('selected');
                    this.classList.remove('selected');
                    gameState.selectedPoem = null;
                });
            });
        }

        function showFullAppreciation(poemIndex) {
            const poemData = matchingData[poemIndex];
            const bubble = document.getElementById('appreciationBubble');
            const bubbleTitle = document.getElementById('bubbleTitle');
            const bubbleContent = document.getElementById('bubbleContent');
            
            bubbleTitle.textContent = poemData.poem;
            bubbleContent.innerHTML = `<p><strong>赏析角度：</strong>${poemData.angle}</p><p><strong>详细赏析：</strong>${poemData.fullAppreciation}</p>`;
            
            const x = Math.max(100, Math.random() * (window.innerWidth - 600));
            const y = Math.max(100, Math.random() * (window.innerHeight - 400));
            bubble.style.left = `${x}px`;
            bubble.style.top = `${y}px`;
            bubble.style.display = 'block';
        }

        function initEmotionGame() {
            const emotionGame = document.getElementById('emotionGame');
            emotionGame.innerHTML = '';
            
            emotionData.forEach((item, index) => {
                const emotionItem = document.createElement('div');
                emotionItem.className = 'emotion-item';
                emotionItem.innerHTML = `
                    <div class="emotion-question">
                        <i class="fas fa-heart" style="color:#c62828"></i> ${index + 1}. ${item.emotion}
                    </div>
                    <div class="emotion-answer">
                        <p><strong>详细解释</strong></p><p>${item.explanation}</p>
                    </div>
                `;
                emotionItem.addEventListener('click', function() {
                    this.classList.toggle('active');
                });
                emotionGame.appendChild(emotionItem);
            });
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('matchingMessage');
            messageDiv.textContent = text;
            messageDiv.className = 'message';
            if (type === 'success') messageDiv.classList.add('success');
            else if (type === 'error') messageDiv.classList.add('error');
            else {
                messageDiv.style.backgroundColor = 'rgba(139, 115, 85, 0.2)';
                messageDiv.style.color = '#5a3d29';
                messageDiv.style.border = '1px solid #8b7355';
                messageDiv.style.display = 'block';
            }
            setTimeout(() => { messageDiv.style.display = 'none'; }, 3000);
        }

        function setupEventListeners() {
            // 音乐控制按钮
            const musicControl = document.getElementById('musicControl');
            if (musicControl) {
                musicControl.addEventListener('click', function(e) {
                    e.stopPropagation();
                    SoundFX.toggleBgMusic();
                });
            }
            
            // 重置按钮
            document.getElementById('resetBtn').addEventListener('click', function() {
                initMatchingGame();
                showMessage('游戏已重置', 'info');
            });
            
            // 关闭赏析气泡
            document.getElementById('closeBubble').addEventListener('click', function() {
                document.getElementById('appreciationBubble').style.display = 'none';
            });
            
            document.addEventListener('click', function(e) {
                const bubble = document.getElementById('appreciationBubble');
                if (bubble.style.display === 'block' && !bubble.contains(e.target)) {
                    bubble.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
