<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破阵子翻译游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "STKaiti", "SimSun", serif;
        }
        
        body {
            background-color: #6b4f37;
            color: #333;
            min-height: 100vh;
            padding: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,0 L100,0 L100,100 Z" fill="%235a3d29" opacity="0.1"/></svg>');
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: rgba(255, 248, 240, 0.92);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #8b7355;
        }
        
        header {
            background: linear-gradient(to right, #3c5b3c, #4a6c4a);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #8b7355;
        }
        
        h1 {
            color: #f5e8d0;
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav-btn {
            background-color: #5a8c7d;
            color: #f5e8d0;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .nav-btn:hover {
            background-color: #4a7668;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        .main-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-title {
            text-align: center;
            font-size: 2.2rem;
            color: #5a3d29;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #8b7355;
            width: 100%;
        }
        
        .instructions {
            background-color: rgba(139, 115, 85, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #8b7355;
            font-size: 1.2rem;
            color: #5a3d29;
            width: 100%;
            text-align: center;
        }
        
        .translation-game {
            width: 100%;
            margin-bottom: 40px;
        }
        
        .poem-container {
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            padding: 30px;
            box-shadow: inset 0 0 10px rgba(139, 115, 85, 0.3);
            border: 1px solid #c9b18b;
            font-size: 1.5rem;
            line-height: 1.8;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .poem-line {
            margin-bottom: 30px;
            position: relative;
        }
        
        .translation-line {
            font-size: 1.2rem;
            color: #5a3d29;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 3px solid #8b7355;
            text-align: left;
            display: none;
            min-height: 80px;
        }
        
        .translation-line.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .highlight-word {
            color: #8b7355;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            display: inline-block;
            padding: 0 2px;
            transition: all 0.2s;
            border-bottom: 2px dotted #8b7355;
        }
        
        .highlight-word:hover {
            color: #c62828;
            transform: translateY(-2px);
            border-bottom: 2px solid #c62828;
        }
        
        .highlight-word.active {
            color: #c62828;
            background-color: rgba(255, 248, 240, 0.8);
            border-radius: 4px;
            padding: 2px 6px;
            border-bottom: 2px solid #c62828;
        }
        
        .translation-tooltip {
            position: absolute;
            background-color: #f5e8d0;
            color: #c62828;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-size: 1.1rem;
            z-index: 100;
            max-width: 300px;
            border: 2px solid #8b7355;
            display: none;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        .translation-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 10px;
            border-style: solid;
            border-color: #8b7355 transparent transparent transparent;
        }
        
        .full-translation {
            background-color: rgba(139, 115, 85, 0.15);
            padding: 30px;
            border-radius: 10px;
            margin-top: 30px;
            width: 100%;
            border-top: 3px solid #8b7355;
        }
        
        .full-translation h3 {
            color: #5a3d29;
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px dashed #8b7355;
        }
        
        .full-translation p {
            font-size: 1.3rem;
            line-height: 1.8;
            color: #5a3d29;
            text-indent: 2em;
        }
        
        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(60, 91, 60, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid #c9aa4f;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .music-control:hover {
            transform: scale(1.1);
            background: rgba(60, 91, 60, 1);
        }
        
        .music-control i {
            color: #e9d6a7;
            font-size: 1.2rem;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #f5e8d0;
            background-color: #3c5b3c;
            border-top: 1px solid #8b7355;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            .nav-buttons {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .nav-btn {
                width: 90%;
                justify-content: center;
            }
            .poem-container {
                font-size: 1.3rem;
                padding: 20px;
            }
            .translation-line {
                font-size: 1.1rem;
            }
            .full-translation p {
                font-size: 1.1rem;
            }
            .game-title {
                font-size: 1.8rem;
            }
            .music-control {
                width: 36px;
                height: 36px;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>破阵子·为陈同甫赋壮词以寄之</h1>
            <div class="nav-buttons">
                <a href="主页.html" class="nav-btn"><i class="fas fa-home"></i> 首页</a>
                <a href="填词.html" class="nav-btn"><i class="fas fa-gamepad"></i> 填词</a>
                <a href="翻译.html" class="nav-btn"><i class="fas fa-language"></i> 翻译</a>
                <a href="赏析.html" class="nav-btn"><i class="fas fa-book-open"></i> 赏析</a>
                <a href="典故.html" class="nav-btn"><i class="fas fa-landmark"></i> 典故</a>
            </div>
        </header>
        
        <main class="main-content">
            <h2 class="game-title">《破阵子·为陈同甫赋壮词以寄之》翻译游戏</h2>
            
            <div class="instructions">
                <p><i class="fas fa-info-circle"></i> 点击诗词中<strong>高亮显示</strong>的字词，查看其翻译解释。每行诗词下方会显示该行的完整翻译。</p>
            </div>
            
            <section class="translation-game">
                <div class="poem-container" id="poemContainer"></div>
            </section>
            
            <div class="full-translation">
                <h3><i class="fas fa-scroll"></i> 完整译文</h3>
                <p>
                    醉梦里挑亮油灯观看宝剑，恍惚间又回到了当年，各个军营里接连不断地响起号角声。把酒食分给部下享用，让乐器奏起雄壮的军乐鼓舞士气。这是秋天在战场上阅兵。<br><br>
                    战马像的卢马一样跑得飞快，弓箭像惊雷一样震耳离弦。我一心想替君主完成收复国家失地的大业，取得世代相传的美名。一梦醒来，可惜已是白发人！
                </p>
            </div>
        </main>
        
        <footer>
            <p>古风翻译游戏 | 破阵子·为陈同甫赋壮词以寄之 | 离线可用</p>
        </footer>
    </div>

    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicControl">
        <i class="fas fa-music" id="musicIcon"></i>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto" style="display: none;">
        <source src="音乐/游戏背景音乐_耳聆网_[声音ID：44022].mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========= 音效管理 =========
        const SoundFX = {
            clickAudio: null,
            bgAudio: null,
            isBgPlaying: false,
            
            init: function() {
                // 初始化点击音效
                this.clickAudio = new Audio();
                this.clickAudio.src = "音乐/叮咚.wav";
                this.clickAudio.volume = 0.5;
                
                // 背景音乐
                this.bgAudio = document.getElementById('bgMusic');
                if (this.bgAudio) {
                    this.bgAudio.volume = 0.35;
                    this.bgAudio.loop = true;
                    
                    this.bgAudio.addEventListener('play', () => {
                        this.isBgPlaying = true;
                        document.getElementById('musicIcon').className = 'fas fa-music';
                        console.log('🎵 背景音乐播放中');
                    });
                    this.bgAudio.addEventListener('pause', () => {
                        this.isBgPlaying = false;
                        document.getElementById('musicIcon').className = 'fas fa-volume-mute';
                    });
                    this.bgAudio.addEventListener('error', () => {
                        console.log('❌ 背景音乐加载失败，请检查文件路径');
                    });
                    
                    // 强制自动播放
                    const playPromise = this.bgAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            console.log('⚠️ 自动播放被阻止，等待用户点击');
                            const startOnInteraction = () => {
                                this.bgAudio.play().catch(e => console.log('播放失败', e));
                                document.removeEventListener('click', startOnInteraction);
                                document.removeEventListener('touchstart', startOnInteraction);
                            };
                            document.addEventListener('click', startOnInteraction);
                            document.addEventListener('touchstart', startOnInteraction);
                        });
                    }
                }
            },
            
            playClick: function() {
                try {
                    this.clickAudio.currentTime = 0;
                    this.clickAudio.play().catch(e => console.log("点击音效播放失败", e));
                } catch(e) {}
            },
            
            toggleBgMusic: function() {
                if (this.isBgPlaying) {
                    this.bgAudio.pause();
                } else {
                    this.bgAudio.play().catch(e => console.log('播放失败', e));
                }
            }
        };

        // 诗词数据和翻译
        const poemData = {
            title: "破阵子·为陈同甫赋壮词以寄之",
            author: "辛弃疾",
            lines: [
                {
                    text: "醉里挑灯看剑，梦回吹角连营。",
                    words: [
                        {word: "醉里", translation: "醉酒之中"},
                        {word: "挑灯", translation: "拨动灯火，点灯"}
                    ],
                    translation: "醉梦里挑亮油灯观看宝剑，恍惚间又回到了当年，各个军营里接连不断地响起号角声。"
                },
                {
                    text: "八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。",
                    words: [
                        {word: "八百里", translation: "指牛，这里泛指酒食"},
                        {word: "麾", translation: "军旗"},
                        {word: "麾下", translation: "指部下"},
                        {word: "五十弦", translation: "本指瑟，泛指乐器"},
                        {word: "翻", translation: "演奏"},
                        {word: "塞外声", translation: "指悲壮粗狂的军乐"},
                        {word: "沙场", translation: "战场"},
                        {word: "点兵", translation: "检阅军队"}
                    ],
                    translation: "把酒食分给部下享用，让乐器奏起雄壮的军乐鼓舞士气。这是秋天在战场上阅兵。"
                },
                {
                    text: "马作的卢飞快，弓如霹雳弦惊。",
                    words: [
                        {word: "作", translation: "像…一样"},
                        {word: "的卢", translation: "马名"},
                        {word: "霹雳", translation: "特别响的雷声，比喻拉弓时弓弦响如惊雷"}
                    ],
                    translation: "战马像的卢马一样跑得飞快，弓箭像惊雷一样震耳离弦。"
                },
                {
                    text: "了却君王天下事，赢得生前身后名。可怜白发生！",
                    words: [
                        {word: "了却", translation: "了结，完成"},
                        {word: "天下事", translation: "此指恢复中原之事"},
                        {word: "赢得", translation: "博得"},
                        {word: "身后", translation: "死后"},
                        {word: "可怜", translation: "可惜"}
                    ],
                    translation: "我一心想替君主完成收复国家失地的大业，取得世代相传的美名。一梦醒来，可惜已是白发人！"
                }
            ]
        };

        // 初始化音效
        SoundFX.init();

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', function() {
            initTranslationGame();
            setupEventListeners();
        });

        // 初始化翻译游戏
        function initTranslationGame() {
            const poemContainer = document.getElementById('poemContainer');
            poemContainer.innerHTML = '';
            
            // 创建每行诗词
            poemData.lines.forEach((lineData, lineIndex) => {
                // 创建诗词行
                const lineDiv = document.createElement('div');
                lineDiv.className = 'poem-line';
                
                // 处理诗词文本，高亮需要翻译的字词
                let lineText = lineData.text;
                lineData.words.forEach(wordData => {
                    // 将字词替换为高亮可点击元素
                    const regex = new RegExp(wordData.word, 'g');
                    lineText = lineText.replace(regex, `<span class="highlight-word" data-word="${wordData.word}" data-translation="${wordData.translation}" data-line="${lineIndex}">${wordData.word}</span>`);
                });
                
                lineDiv.innerHTML = lineText;
                poemContainer.appendChild(lineDiv);
                
                // 创建翻译行
                const translationDiv = document.createElement('div');
                translationDiv.className = 'translation-line';
                translationDiv.id = `translation-${lineIndex}`;
                translationDiv.innerHTML = `<strong>译文：</strong> ${lineData.translation}`;
                poemContainer.appendChild(translationDiv);
            });
            
            // 添加翻译提示框
            const tooltip = document.createElement('div');
            tooltip.className = 'translation-tooltip';
            tooltip.id = 'translationTooltip';
            document.body.appendChild(tooltip);
            
            // 设置字词点击事件
            setupWordClickEvents();
        }

        // 设置字词点击事件
        function setupWordClickEvents() {
            const highlightWords = document.querySelectorAll('.highlight-word');
            const translationTooltip = document.getElementById('translationTooltip');
            let activeWord = null;
            
            highlightWords.forEach(word => {
                word.addEventListener('click', function(e) {
                    e.stopPropagation();
                    
                    // 播放点击音效
                    SoundFX.playClick();
                    
                    const wordText = this.getAttribute('data-word');
                    const translation = this.getAttribute('data-translation');
                    const lineIndex = this.getAttribute('data-line');
                    
                    // 如果已经有激活的字词，先取消激活
                    if (activeWord) {
                        activeWord.classList.remove('active');
                        
                        // 隐藏对应行的翻译
                        const prevLineIndex = activeWord.getAttribute('data-line');
                        const prevTranslationDiv = document.getElementById(`translation-${prevLineIndex}`);
                        prevTranslationDiv.classList.remove('active');
                    }
                    
                    // 如果点击的是同一个字词，则只隐藏提示
                    if (activeWord === this) {
                        activeWord = null;
                        translationTooltip.style.display = 'none';
                        return;
                    }
                    
                    // 激活当前字词
                    this.classList.add('active');
                    activeWord = this;
                    
                    // 显示翻译提示
                    translationTooltip.innerHTML = `<strong>${wordText}</strong><br>${translation}`;
                    translationTooltip.style.display = 'block';
                    
                    // 定位提示框
                    const rect = this.getBoundingClientRect();
                    translationTooltip.style.top = `${rect.top - 90}px`;
                    translationTooltip.style.left = `${rect.left + rect.width/2}px`;
                    
                    // 显示对应行的完整翻译
                    const translationDiv = document.getElementById(`translation-${lineIndex}`);
                    translationDiv.classList.add('active');
                    
                    // 滚动到翻译区域
                    translationDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                });
            });
            
            // 点击页面其他区域隐藏提示
            document.addEventListener('click', function() {
                if (activeWord) {
                    activeWord.classList.remove('active');
                    activeWord = null;
                }
                translationTooltip.style.display = 'none';
                
                // 隐藏所有翻译行
                const translationDivs = document.querySelectorAll('.translation-line');
                translationDivs.forEach(div => {
                    div.classList.remove('active');
                });
            });
            
            // 阻止提示框点击事件冒泡
            translationTooltip.addEventListener('click', function(e) {
                e.stopPropagation();
            });
        }

        // 设置按钮事件监听器
        function setupEventListeners() {
            // 音乐控制按钮
            const musicControl = document.getElementById('musicControl');
            if (musicControl) {
                musicControl.addEventListener('click', function(e) {
                    e.stopPropagation();
                    SoundFX.toggleBgMusic();
                });
            }
            
            // 导航按钮事件
            document.getElementById('translateBtn').addEventListener('click', function() {
                window.location.href = '翻译.html';
            });
            
            document.getElementById('appreciationBtn').addEventListener('click', function() {
                window.location.href = '赏析.html';
            });
            
            document.getElementById('allusionBtn').addEventListener('click', function() {
                window.location.href = '典故.html';
            });
        }
    </script>
</body>
</html>
