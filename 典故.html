<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破阵子典故游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 样式保持不变，与之前相同 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "STKaiti", "SimSun", serif;
        }
        
        body {
            background-color: #6b4f37;
            color: #333;
            min-height: 100vh;
            padding: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,0 L100,0 L100,100 Z" fill="%235a3d29" opacity="0.1"/></svg>');
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: rgba(255, 248, 240, 0.92);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #8b7355;
        }
        
        header {
            background: linear-gradient(to right, #3c5b3c, #4a6c4a);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #8b7355;
        }
        
        h1 {
            color: #f5e8d0;
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        
        .nav-btn {
            background-color: #5a8c7d;
            color: #f5e8d0;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .nav-btn:hover {
            background-color: #4a7668;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        .main-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .game-title {
            text-align: center;
            font-size: 2.2rem;
            color: #5a3d29;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #8b7355;
            width: 100%;
        }
        
        .instructions {
            background-color: rgba(139, 115, 85, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #8b7355;
            font-size: 1.2rem;
            color: #5a3d29;
            width: 100%;
            text-align: center;
        }
        
        .map-section {
            width: 100%;
            margin-bottom: 30px;
            background: rgba(139, 115, 85, 0.15);
            border-radius: 16px;
            padding: 20px;
            border: 2px solid #c9b18b;
            position: relative;
        }
        
        .map-title {
            text-align: center;
            font-size: 1.5rem;
            color: #5a3d29;
            margin-bottom: 15px;
        }
        
        .map-container {
            position: relative;
            width: 100%;
            min-height: 450px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><rect width="800" height="500" fill="%23d4c2a5"/><path d="M100,400 L200,350 L350,380 L500,320 L650,360 L750,300" stroke="%238b7355" stroke-width="3" fill="none"/><path d="M150,350 L250,300 L400,330 L550,270 L700,310" stroke="%238b7355" stroke-width="2" fill="none" stroke-dasharray="8,4"/><circle cx="400" cy="250" r="120" fill="%23c9b18b" opacity="0.3"/><text x="400" y="480" text-anchor="middle" fill="%238b7355" font-size="14">古战场示意图</text></svg>');
            background-size: cover;
            background-position: center;
            border-radius: 12px;
            border: 1px solid #8b7355;
            cursor: pointer;
        }
        
        .map-item {
            position: absolute;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.3));
            font-size: 2rem;
        }
        
        .map-item:hover {
            transform: scale(1.15);
            filter: drop-shadow(3px 3px 8px rgba(0,0,0,0.4));
        }
        
        .map-item.correct-clicked {
            animation: correctPulse 0.5s ease;
        }
        
        .map-item.wrong-clicked {
            animation: wrongShake 0.5s ease;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); filter: drop-shadow(0 0 10px #2e7d32); }
        }
        
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .allusion-bubble {
            position: fixed;
            background-color: #f5e8d0;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border: 3px solid #8b7355;
            z-index: 1000;
            max-width: 700px;
            display: none;
            animation: bubbleAppear 0.5s ease;
            overflow-y: auto;
            max-height: 85vh;
        }
        
        @keyframes bubbleAppear {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .bubble-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #8b7355;
        }
        
        .bubble-title {
            color: #5a3d29;
            font-size: 1.8rem;
            margin: 0;
        }
        
        .close-bubble {
            font-size: 2rem;
            color: #8b7355;
            cursor: pointer;
            line-height: 1;
            transition: color 0.3s;
        }
        
        .close-bubble:hover {
            color: #c62828;
        }
        
        .bubble-content {
            color: #5a3d29;
            font-size: 1.3rem;
            line-height: 1.8;
        }
        
        .bubble-section {
            margin-bottom: 25px;
        }
        
        .bubble-section-title {
            color: #5a3d29;
            font-size: 1.5rem;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #8b7355;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .poem-excerpt {
            background-color: rgba(139, 115, 85, 0.1);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #5a8c7d;
            font-style: italic;
            margin: 15px 0;
            font-size: 1.4rem;
            color: #5a3d29;
            text-align: center;
        }
        
        .cultural-interpretation {
            background-color: rgba(198, 40, 40, 0.05);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #c62828;
            margin-top: 20px;
        }
        
        .audio-btn {
            background-color: #5a8c7d;
            color: #f5e8d0;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            width: 100%;
            justify-content: center;
        }
        
        .audio-btn:hover {
            background-color: #4a7668;
            transform: scale(1.02);
        }
        
        .audio-btn.playing {
            background-color: #c62828;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .poem-display {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 10px;
            margin-top: 30px;
            border: 2px solid #8b7355;
            width: 100%;
        }
        
        .poem-display-title {
            color: #5a3d29;
            font-size: 1.6rem;
            margin-bottom: 15px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px dashed #8b7355;
        }
        
        .poem-text {
            color: #5a3d29;
            font-size: 1.4rem;
            line-height: 1.8;
            text-align: center;
        }
        
        .highlight-allusion {
            color: #c62828;
            font-weight: bold;
            border-bottom: 2px dotted #c62828;
            cursor: pointer;
        }
        
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(60, 91, 60, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid #c9aa4f;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .music-control:hover {
            transform: scale(1.1);
            background: rgba(60, 91, 60, 1);
        }
        
        .music-control i {
            color: #e9d6a7;
            font-size: 1.2rem;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #f5e8d0;
            background-color: #3c5b3c;
            border-top: 1px solid #8b7355;
        }
        
        @media (max-width: 900px) {
            h1 {
                font-size: 2.2rem;
            }
            .nav-buttons {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .nav-btn {
                width: 90%;
                justify-content: center;
            }
            .allusion-bubble {
                width: 90%;
                max-width: 90%;
                padding: 20px;
            }
            .bubble-content {
                font-size: 1.2rem;
            }
            .map-item {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

        <main class="main-content">
            <h2 class="game-title">《破阵子·为陈同甫赋壮词以寄之》典故探秘</h2>
            
            <div class="instructions">
                <p><i class="fas fa-info-circle"></i> <strong>🗺️ 地图寻宝：</strong> 点击地图上的物品，找出与"八百里"、"五十弦"、"的卢"典故相关的意象！</p>
                <p><i class="fas fa-info-circle"></i> <strong>📖 典故学习：</strong> 点击下方诗词中的高亮词，查看完整典故解读。</p>

            <div class="map-section">
                <h3 class="map-title">🗺️ 词境寻宝图 🗺️</h3>
                <div class="map-container" id="mapContainer"></div>
            </div>
            
            <div class="poem-display">
                <h3 class="poem-display-title">《破阵子·为陈同甫赋壮词以寄之》中的典故</h3>
                <div class="poem-text">
                    醉里挑灯看剑，梦回吹角连营。<br>
                    <span class="highlight-allusion" data-story="1">八百里</span>分麾下炙，<span class="highlight-allusion" data-story="2">五十弦</span>翻塞外声，沙场秋点兵。<br>
                    马作<span class="highlight-allusion" data-story="3">的卢</span>飞快，弓如霹雳弦惊。<br>
                    了却君王天下事，赢得生前身后名。可怜白发生！
                </div>
            </div>
            
            <div class="allusion-bubble" id="allusionBubble">
                <div class="bubble-header">
                    <h4 class="bubble-title" id="bubbleTitle">典故解析</h4>
                    <div class="close-bubble" id="closeBubble">×</div>
                </div>
                <div class="bubble-content" id="bubbleContent"></div>
                <button class="audio-btn" id="audioPlayBtn"><i class="fas fa-volume-up"></i> 收听典故讲解</button>
            </div>
        </main>
        
        <footer>
            <p>古风典故游戏 | 破阵子·为陈同甫赋壮词以寄之 | 离线可用</p>

    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto" style="display: none;">
        <source src="音乐/游戏背景音乐_耳聆网_[声音ID：44022].mp3" type="audio/mpeg">
    </audio>

    <!-- 典故讲解音频 -->
    <audio id="audioStory1" preload="auto" style="display: none;">
        <source src="音乐/八百里.mp3" type="audio/mpeg">
    </audio>
    <audio id="audioStory2" preload="auto" style="display: none;">
        <source src="音乐/五十弦.mp3" type="audio/mpeg">
    </audio>
    <audio id="audioStory3" preload="auto" style="display: none;">
        <source src="音乐/的卢.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========= 音效管理 =========
        const SoundFX = {
            correctAudio: null,
            wrongAudio: null,
            bgAudio: null,
            isBgPlaying: false,
            
            init: function() {
                this.correctAudio = new Audio();
                this.correctAudio.src = "音乐/对勾，答对——综艺_耳聆网_[声音ID：36966].mp3";
                this.correctAudio.volume = 0.5;
                
                this.wrongAudio = new Audio();
                this.wrongAudio.src = "音乐/错误音效_耳聆网_[声音ID：36278].mp3";
                this.wrongAudio.volume = 0.5;
                
                this.bgAudio = document.getElementById('bgMusic');
                if (this.bgAudio) {
                    this.bgAudio.volume = 0.35;
                    this.bgAudio.loop = true;
                    
                    this.bgAudio.addEventListener('play', () => {
                        this.isBgPlaying = true;
                        document.getElementById('musicIcon').className = 'fas fa-music';
                    });
                    this.bgAudio.addEventListener('pause', () => {
                        this.isBgPlaying = false;
                        document.getElementById('musicIcon').className = 'fas fa-volume-mute';
                    });
                    
                    const playPromise = this.bgAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            const startOnInteraction = () => {
                                this.bgAudio.play().catch(e => console.log('播放失败', e));
                                document.removeEventListener('click', startOnInteraction);
                                document.removeEventListener('touchstart', startOnInteraction);
                            };
                            document.addEventListener('click', startOnInteraction);
                            document.addEventListener('touchstart', startOnInteraction);
                        });
                    }
                }
            },
            
            playCorrect: function() {
                try {
                    this.correctAudio.currentTime = 0;
                    this.correctAudio.play().catch(e => console.log("正确音效播放失败", e));
                } catch(e) {}
            },
            
            playWrong: function() {
                try {
                    this.wrongAudio.currentTime = 0;
                    this.wrongAudio.play().catch(e => console.log("错误音效播放失败", e));
                } catch(e) {}
            },
            
            toggleBgMusic: function() {
                if (this.isBgPlaying) {
                    this.bgAudio.pause();
                } else {
                    this.bgAudio.play().catch(e => console.log('播放失败', e));
                }
            }
        };

        // 完整典故数据
        const allusionData = [
            {
                id: 1,
                title: "八百里典故",
                fullStory: "王恺有一头名为'八百里驳'的良牛，常炫耀其蹄角晶莹。王济以千万钱为赌注与王恺比箭，王恺自恃箭术高超且认为名牛不可杀，便让王济先射。王济一箭命中靶心后，立即命人取牛心烤食，片刻后仅尝一块便离去。这个典故出自《世说新语·汰侈》，展现了晋代贵族的奢靡与豪气。",
                source: "典出《世说新语·汰侈》",
                poemLine: "八百里分麾下炙",
                interpretation: "辛弃疾在词中化用此典，将奢华的'八百里驳'转化为军营中将士共享的烤牛肉。此处借'八百里'代指烤牛肉，描绘将士分食烤肉的豪迈场景，既体现军营生活的慷慨激昂，又暗含对古代豪侠之气的追慕。辛弃疾通过这一典故，将历史中的奢靡意象转化为军中同甘共苦的精神象征。",
                audioId: "audioStory1"
            },
            {
                id: 2,
                title: "五十弦典故",
                fullStory: "神话传说中，太帝命素女演奏五十弦瑟，其声悲怆动人，以至于天帝因哀伤而下令将瑟破分为二十五弦。此后，'五十弦'成为瑟的代称。这个神话故事记载于《史记·封禅书》等古籍，代表了古代音乐的神秘与悲壮。",
                source: "记载于《史记·封禅书》等古籍",
                poemLine: "五十弦翻塞外声",
                interpretation: "在辛弃疾的词中，'五十弦'并非实指乐器数量，而是借古喻今，用瑟的悲音与边塞战歌结合，营造出苍凉雄浑的战场意境。这一典故既体现了古代战争音乐的文化传统，又暗含对南宋朝廷偏安一隅、恢复中原无望的隐晦批判。",
                audioId: "audioStory2"
            },
            {
                id: 3,
                title: "的卢典故",
                fullStory: "刘备依附荆州刘表时，因深得民心遭刘表妻弟蔡瑁忌惮。蔡瑁设计在宴会上刺杀刘备，刘备察觉后仓皇逃离，一路被追兵逼至檀溪边。此时前有数丈宽的檀溪阻隔，后有追兵逼近，刘备陷入绝境。刘备情急之下高呼：'的卢，今日危难，当奋力一跃！' 胯下的卢马仿佛通晓人意，猛然腾空而起，竟纵越三丈，成功渡溪脱险，留下'的卢救主'的传奇典故。",
                source: "见于《三国志·蜀书·先主传》",
                poemLine: "马作的卢飞快",
                interpretation: "辛弃疾以'的卢'象征战士骁勇，同时借刘备的绝境逆袭，暗喻自身渴望突破现实困局、实现北伐理想的迫切心情。的卢马救主的故事，展现了在绝境中逆袭的勇气与忠义精神。",
                audioId: "audioStory3"
            }
        ];

        let currentAudio = null;

        function initMap() {
            const mapContainer = document.getElementById('mapContainer');
            mapItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'map-item';
                itemDiv.innerHTML = item.icon;
                itemDiv.style.left = item.left;
                itemDiv.style.top = item.top;
                itemDiv.style.position = 'absolute';
                itemDiv.setAttribute('data-id', item.id);
                itemDiv.setAttribute('data-correct', item.isCorrect);
                itemDiv.setAttribute('data-story-id', item.storyId || '');
                itemDiv.title = item.name;
                
                itemDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    handleMapItemClick(itemDiv, item);
                });
                
                mapContainer.appendChild(itemDiv);
            });
        }

        function handleMapItemClick(element, item) {
            if (item.isCorrect) {
                element.classList.add('correct-clicked');
                SoundFX.playCorrect();
                showAllusionBubble(item.storyId);
                setTimeout(() => {
                    element.classList.remove('correct-clicked');
                }, 500);
            } else {
                element.classList.add('wrong-clicked');
                SoundFX.playWrong();
                showTemporaryMessage(`❌ "${item.name}" 与典故无关，再试试看！`, 'error');
                setTimeout(() => {
                    element.classList.remove('wrong-clicked');
                }, 500);
            }
        }

        function showTemporaryMessage(msg, type) {
            let msgDiv = document.getElementById('tempMapMessage');
            if (!msgDiv) {
                msgDiv = document.createElement('div');
                msgDiv.id = 'tempMapMessage';
                msgDiv.style.position = 'fixed';
                msgDiv.style.bottom = '100px';
                msgDiv.style.left = '50%';
                msgDiv.style.transform = 'translateX(-50%)';
                msgDiv.style.backgroundColor = type === 'error' ? 'rgba(198, 40, 40, 0.9)' : 'rgba(46, 125, 50, 0.9)';
                msgDiv.style.color = 'white';
                msgDiv.style.padding = '12px 24px';
                msgDiv.style.borderRadius = '40px';
                msgDiv.style.zIndex = '1000';
                msgDiv.style.fontSize = '1.1rem';
                document.body.appendChild(msgDiv);
            }
            msgDiv.textContent = msg;
            msgDiv.style.backgroundColor = type === 'error' ? 'rgba(198, 40, 40, 0.9)' : 'rgba(46, 125, 50, 0.9)';
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 2000);
        }

        function stopCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio = null;
            }
            const audioBtn = document.getElementById('audioPlayBtn');
            audioBtn.classList.remove('playing');
            audioBtn.innerHTML = '<i class="fas fa-volume-up"></i> 收听典故讲解';
        }

        function showAllusionBubble(allusionId) {
            const allusion = allusionData.find(item => item.id === allusionId);
            if (!allusion) return;
            
            currentAllusionId = allusionId;
            const bubble = document.getElementById('allusionBubble');
            const bubbleTitle = document.getElementById('bubbleTitle');
            const bubbleContent = document.getElementById('bubbleContent');
            
            stopCurrentAudio();
            
            bubbleTitle.textContent = allusion.title;
            bubbleContent.innerHTML = `
                <div class="bubble-section">
                    <h5 class="bubble-section-title"><i class="fas fa-book"></i> 典故故事</h5>
                    <p>${allusion.fullStory}</p>
                    <p><strong>出处：</strong>${allusion.source}</p>
                </div>
                <div class="poem-excerpt">${allusion.poemLine}</div>
                <div class="cultural-interpretation">
                    <h5 class="bubble-section-title"><i class="fas fa-brain"></i> 文化解读</h5>
                    <p>${allusion.interpretation}</p>
                </div>
            `;
            
            const x = Math.max(50, Math.random() * (window.innerWidth - 700));
            const y = Math.max(50, Math.random() * (window.innerHeight - 500));
            bubble.style.left = `${x}px`;
            bubble.style.top = `${y}px`;
            bubble.style.display = 'block';
        }

        // ========= 修复后的音频播放函数 =========
        function playAudioForCurrentStory() {
            if (!currentAllusionId) {
                showTemporaryMessage(`⚠️ 请先点击典故查看详情`, 'error');
                return;
            }
            
            const allusion = allusionData.find(item => item.id === currentAllusionId);
            if (!allusion) return;
            
            const audioElement = document.getElementById(allusion.audioId);
            const audioBtn = document.getElementById('audioPlayBtn');
            
            // 检查音频元素是否存在
            if (!audioElement) {
                showTemporaryMessage(`⚠️ 音频元素不存在`, 'error');
                return;
            }
            
            // 如果正在播放同一个音频，则停止
            if (currentAudio === audioElement && !audioElement.paused) {
                stopCurrentAudio();
                return;
            }
            
            // 停止其他音频
            stopCurrentAudio();
            
            currentAudio = audioElement;
            audioElement.currentTime = 0;
            
            // 重新加载音频
            audioElement.load();
            
            audioElement.play().then(() => {
                audioBtn.classList.add('playing');
                audioBtn.innerHTML = '<i class="fas fa-stop"></i> 停止播放';
                console.log('音频播放成功:', allusion.audioId);
            }).catch(err => {
                console.log('音频播放失败:', err);
                let errorMsg = '音频播放失败';
                if (err.name === 'NotSupportedError') {
                    errorMsg = '浏览器不支持该音频格式';
                } else if (err.name === 'NotFoundError') {
                    errorMsg = '音频文件不存在';
                }
                showTemporaryMessage(`⚠️ ${errorMsg}，请检查音乐文件夹`, 'error');
                stopCurrentAudio();
            });
            
            audioElement.onended = () => {
                stopCurrentAudio();
            };
            
            audioElement.onerror = () => {
                console.error('音频加载错误');
                showTemporaryMessage(`⚠️ 音频文件加载失败，请检查文件路径`, 'error');
                stopCurrentAudio();
            };
        }

        // 初始化
        SoundFX.init();
        initMap();
        
        document.querySelectorAll('.highlight-allusion').forEach(element => {
            element.addEventListener('click', function() {
                const storyId = parseInt(this.dataset.story);
                showAllusionBubble(storyId);
            });
        });
        
        document.getElementById('closeBubble').addEventListener('click', () => {
            document.getElementById('allusionBubble').style.display = 'none';
            stopCurrentAudio();
        });
        
        document.getElementById('audioPlayBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            playAudioForCurrentStory();
        });
        
        document.addEventListener('click', (e) => {
            const bubble = document.getElementById('allusionBubble');
            if (bubble.style.display === 'block' && !bubble.contains(e.target) && 
                !e.target.classList.contains('highlight-allusion') && 
                !e.target.closest('.map-item')) {
                bubble.style.display = 'none';
                stopCurrentAudio();
            }
        });
        
        document.getElementById('musicControl').addEventListener('click', (e) => {
            e.stopPropagation();
            SoundFX.toggleBgMusic();
        });
    </script>
</body>
</html>
