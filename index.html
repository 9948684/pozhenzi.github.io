<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>破阵子·为陈同甫赋壮词以寄之 | 辛弃疾 · 古风封面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: '华文行书', 'STXingkai', '楷体', 'Microsoft YaHei', '行楷', cursive;
            position: relative;
            background: #1e1a0f;
        }

        /* 古风全屏背景图片层 */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            background-image: url('img/封面.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            z-index: -2;
        }

        /* 半透明暖色层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 8, 5, 0.35);
            z-index: -1;
            pointer-events: none;
        }

        /* 主容器 - 全屏可点击跳转 */
        .clickable-cover {
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
            display: block;
            text-decoration: none;
        }

        /* 内容居中布局 */
        .content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        /* 标题区域容器 */
        .title-wrapper {
            text-align: center;
            transition: transform 0.2s ease;
            animation: floatUpDown 2.8s infinite ease-in-out;
            filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.5));
            pointer-events: none;
        }

        /* 标题大字 */
        .main-title {
            font-family: '华文行书', 'STXingkai', '楷体', 'Microsoft YaHei', cursive;
            font-size: clamp(2.2rem, 8vw, 5rem);
            font-weight: 700;
            color: #e9d6a7;
            text-shadow: 
                0 1px 0 #b87c2e,
                0 2px 0 #a56b1f,
                0 3px 0 #8f5a18,
                0 4px 8px rgba(0, 0, 0, 0.6),
                0 0 12px rgba(212, 175, 55, 0.5);
            letter-spacing: 0.08em;
            white-space: nowrap;
            background: none;
        }

        @media (max-width: 768px) {
            .main-title {
                white-space: normal;
                word-break: keep-all;
                font-size: 1.8rem;
                padding: 0 15px;
                line-height: 1.3;
            }
            .author-text {
                font-size: 1.2rem !important;
            }
        }

        /* 作者区域 */
        .author-section {
            width: 100%;
            max-width: 90%;
            margin-top: 1.8rem;
            display: flex;
            justify-content: flex-end;
            padding-right: 8%;
            box-sizing: border-box;
            pointer-events: none;
        }

        .author-text {
            font-family: '华文行书', '楷体', 'STXingkai', cursive;
            font-size: 1.5rem;
            font-weight: 500;
            color: #f3e5c0;
            text-shadow: 1px 1px 3px #2c2416;
            background: rgba(30, 25, 15, 0.5);
            backdrop-filter: blur(3px);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            letter-spacing: 2px;
            border-left: 3px solid #e6c87a;
            border-right: 1px solid rgba(230, 200, 120, 0.3);
        }

        /* 底部古风诗句装饰 */
        .poem-excerpt {
            position: absolute;
            bottom: 4%;
            left: 4%;
            font-size: 0.85rem;
            color: rgba(240, 220, 160, 0.9);
            font-family: '楷体', '华文楷书', cursive;
            background: rgba(0, 0, 0, 0.4);
            padding: 5px 14px;
            border-radius: 25px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            letter-spacing: 1px;
            font-style: italic;
        }

        /* 右上角古风印章 */
        .seal {
            position: fixed;
            top: 3%;
            right: 4%;
            width: 80px;
            height: 80px;
            opacity: 0.85;
            pointer-events: none;
            z-index: 10;
        }
        
        .seal img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.4));
            transition: transform 0.3s ease;
        }

        .seal-fallback {
            display: none;
        }

        @keyframes floatUpDown {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(60, 91, 60, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid #c9aa4f;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .music-control:hover {
            transform: scale(1.1);
            background: rgba(60, 91, 60, 1);
        }
        
        .music-control i {
            color: #e9d6a7;
            font-size: 1.2rem;
        }

        /* 音乐状态提示 */
        .music-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #e9d6a7;
            z-index: 10;
            letter-spacing: 1px;
            border: 1px solid rgba(230, 200, 120, 0.4);
            pointer-events: none;
            font-family: '楷体', '华文楷书', cursive;
        }
        
        .music-hint i {
            font-style: normal;
            display: inline-block;
            animation: pulseNote 1.2s infinite;
        }

        @keyframes pulseNote {
            0%, 100% { opacity: 0.6; transform: scale(1);}
            50% { opacity: 1; transform: scale(1.1);}
        }

        /* 点击波纹效果 */
        .click-ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(230, 200, 120, 0.4);
            transform: scale(0);
            animation: rippleAnim 0.5s linear;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(8);
                opacity: 0;
            }
        }

        html, body {
            overflow: hidden;
        }

        .click-hint {
            position: absolute;
            bottom: 12%;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 1rem;
            color: #f0e2b6;
            text-shadow: 0 2px 4px #00000055;
            background: rgba(0,0,0,0.3);
            display: inline-block;
            width: fit-content;
            margin: 0 auto;
            padding: 6px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-family: '楷体', '华文楷书', cursive;
            letter-spacing: 2px;
            white-space: nowrap;
        }
        
        @media (max-width: 640px) {
            .click-hint { 
                font-size: 0.7rem; 
                white-space: nowrap; 
                bottom: 10%; 
            }
            .seal {
                width: 55px;
                height: 55px;
                top: 2%;
                right: 3%;
            }
            .music-control {
                width: 36px;
                height: 36px;
                bottom: 15px;
                left: 15px;
            }
            .music-control i {
                font-size: 1rem;
            }
        }
    </style>
    <!-- 引入 Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 古风背景图片 -->
    <div class="bg-image"></div>
    <!-- 半透明暖色叠加层 -->
    <div class="overlay"></div>
    
    <!-- 右上角古风印章图片 -->
    <div class="seal" id="sealImage">
        <img src="img/章子.png" alt="辛弃疾印" onerror="this.style.display='none'; document.getElementById('sealFallback').style.display='block';">
        <div id="sealFallback" class="seal-fallback" style="display:none;">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
                <rect x="15" y="15" width="70" height="70" stroke="#c9aa4f" stroke-width="2.5" fill="none" stroke-dasharray="4 3"/>
                <path d="M30 50 L70 50 M50 30 L50 70" stroke="#c9aa4f" stroke-width="2" stroke-linecap="round"/>
                <text x="50" y="78" font-size="22" text-anchor="middle" fill="#c9aa4f" font-family="Georgia" font-weight="bold">辛</text>
            </svg>
        </div>
    </div>
    
    <!-- 全屏可点击区域 - 跳转到主页 -->
    <a href="主页.html" class="clickable-cover" id="coverClickable">
        <div class="content">
            <div class="title-wrapper">
                <h1 class="main-title">《破阵子·为陈同甫赋壮词以寄之》</h1>
            </div>
            <div class="author-section">
                <span class="author-text">词人：辛弃疾</span>
            </div>
            <div class="poem-excerpt">
                ︎ 醉里挑灯看剑 · 梦回吹角连营 ︎
            </div>
        </div>
        <div class="click-hint">
            ✦ 轻触任意处，步入词境 ✦
        </div>
    </a>
    
    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicControl">
        <i class="fas fa-music" id="musicIcon"></i>
    </div>
    
    <!-- 音乐播放状态提示 -->
    <div class="music-hint">
        <i>🎵</i> 古韵 · 弦音入境 <i>🎵</i>
    </div>
	
    <audio id="bgMusic" loop preload="auto" autoplay style="display: none;">
        <source src="音乐/音乐.mp3" type="audio/mpeg">
    </audio>
	
   <script>
   (function() {
       const audio = document.getElementById('bgMusic');
       const musicControl = document.getElementById('musicControl');
       const musicIcon = document.getElementById('musicIcon');
       
       if (!audio) {
           console.error('未找到音频元素');
           return;
       }
       
       // 设置音量和循环
       audio.volume = 0.35;
       audio.loop = true;
       
       let isPlaying = false;
       let playAttempted = false;
       
       // 强制自动播放（利用用户首次触摸/点击的时机）
       function forceAutoPlay() {
           if (playAttempted) return;
           playAttempted = true;
           
           const playPromise = audio.play();
           
           if (playPromise !== undefined) {
               playPromise.then(() => {
                   isPlaying = true;
                   if (musicIcon) musicIcon.className = 'fas fa-music';
                   console.log('✅ 音乐自动播放成功');
               }).catch((error) => {
                   isPlaying = false;
                   if (musicIcon) musicIcon.className = 'fas fa-volume-mute';
                   console.log('⚠️ 自动播放被浏览器阻止，等待页面任意点击', error);
               });
           }
       }
       
       // 监听整个页面的第一次点击/触摸，立即播放音乐
       const playOnFirstInteraction = function() {
           if (!isPlaying && !playAttempted) {
               audio.play().then(() => {
                   isPlaying = true;
                   if (musicIcon) musicIcon.className = 'fas fa-music';
                   console.log('🎵 用户首次交互后音乐开始播放');
               }).catch(e => console.log('播放失败', e));
           }
           // 移除监听，只触发一次
           document.removeEventListener('click', playOnFirstInteraction);
           document.removeEventListener('touchstart', playOnFirstInteraction);
       };
       
       // 页面加载后立即尝试自动播放
       window.addEventListener('load', function() {
           setTimeout(forceAutoPlay, 50);
           
           // 如果自动播放失败，等待用户第一次点击页面任意位置
           document.addEventListener('click', playOnFirstInteraction);
           document.addEventListener('touchstart', playOnFirstInteraction);
       });
       
       // 音乐控制按钮点击事件
       if (musicControl) {
           musicControl.addEventListener('click', function(e) {
               e.stopPropagation();
               
               if (isPlaying) {
                   audio.pause();
                   isPlaying = false;
                   if (musicIcon) musicIcon.className = 'fas fa-volume-mute';
                   console.log('⏸️ 音乐已暂停');
               } else {
                   audio.play().then(() => {
                       isPlaying = true;
                       if (musicIcon) musicIcon.className = 'fas fa-music';
                       console.log('▶️ 音乐开始播放');
                   }).catch(err => {
                       console.log('播放失败', err);
                   });
               }
           });
       }
       
       // 音乐加载错误处理
       audio.addEventListener('error', function(e) {
           console.error('❌ 音乐加载失败，请检查文件路径: img/音乐.mp3');
           if (musicIcon) musicIcon.className = 'fas fa-exclamation-triangle';
       });
       
       audio.addEventListener('canplaythrough', function() {
           console.log('✅ 音乐文件加载完成');
       });
       
       // 页面可见性变化处理
       document.addEventListener('visibilitychange', function() {
           if (document.hidden) {
               if (isPlaying) {
                   audio.pause();
               }
           } else {
               if (isPlaying) {
                   audio.play().catch(e => console.log('恢复播放失败'));
               }
           }
       });
       
       // 背景图片加载检测
       const bgDiv = document.querySelector('.bg-image');
       if (bgDiv) {
           const testImg = new Image();
           testImg.onload = function() {
               console.log('✅ 封面图片加载成功');
           };
           testImg.onerror = function() {
               console.log('⚠️ 封面图片加载失败');
           };
           testImg.src = 'img/封面.png';
       }
       
       // 印章图片加载检测
       const sealImg = document.querySelector('.seal img');
       if (sealImg) {
           sealImg.onerror = function() {
               console.log('⚠️ 印章图片加载失败，使用SVG备用');
               this.style.display = 'none';
               const fallback = document.getElementById('sealFallback');
               if (fallback) fallback.style.display = 'block';
           };
       }
       
       console.log('🎬 古风封面已加载完成');
   })();
   </script>
