<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破阵子填词游戏</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "STKaiti", "SimSun", serif;
        }
        
        body {
            background-color: #6b4f37;
            color: #333;
            min-height: 100vh;
            padding: 20px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><path d="M0,0 L100,0 L100,100 Z" fill="%235a3d29" opacity="0.1"/></svg>');
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: rgba(255, 248, 240, 0.92);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid #8b7355;
        }
        
        header {
            background: linear-gradient(to right, #3c5b3c, #4a6c4a);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #8b7355;
        }
        
        h1 {
            color: #f5e8d0;
            font-size: 2.8rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 15px;
        }
        
        .nav-btn {
            background-color: #5a8c7d;
            color: #f5e8d0;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        
        .nav-btn:hover {
            background-color: #4a7668;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        .main-content {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .poem-section {
            width: 100%;
            margin-bottom: 40px;
        }
        
        .poem-title {
            text-align: center;
            font-size: 1.8rem;
            color: #5a3d29;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #8b7355;
        }
        
        .poem-container {
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            padding: 25px;
            box-shadow: inset 0 0 10px rgba(139, 115, 85, 0.3);
            border: 1px solid #c9b18b;
            font-size: 1.5rem;
            line-height: 2.8;
            text-align: center;
        }
        
        .poem-line {
            margin-bottom: 5px;
        }
        
        .blank {
            display: inline-block;
            width: 60px;
            height: 60px;
            border-bottom: 2px dashed #8b7355;
            margin: 0 5px;
            vertical-align: middle;
            position: relative;
        }
        
        .blank.filled {
            border-bottom: none;
        }
        
        .blank.correct {
            color: #2e7d32;
        }
        
        .blank.incorrect {
            color: #c62828;
        }
        
        .bubbles-section {
            width: 100%;
            margin-top: 20px;
        }
        
        .bubbles-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .bubble {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: grab;
            user-select: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s;
        }
        
        .bubble:hover {
            transform: scale(1.1);
        }
        
        .bubble.dragging {
            opacity: 0.7;
            cursor: grabbing;
        }
        
        .bubble.used {
            opacity: 0.3;
            cursor: default;
        }
        
        .bubble.used:hover {
            transform: none;
        }
        
        .message {
            margin-top: 30px;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 1.4rem;
            text-align: center;
            display: none;
            max-width: 80%;
        }
        
        .success {
            background-color: rgba(46, 125, 50, 0.2);
            color: #2e7d32;
            border: 1px solid #2e7d32;
            display: block;
        }
        
        .error {
            background-color: rgba(198, 40, 40, 0.2);
            color: #c62828;
            border: 1px solid #c62828;
            display: block;
        }
        
        .instructions {
            background-color: rgba(139, 115, 85, 0.1);
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
            border-left: 4px solid #8b7355;
            font-size: 1.1rem;
            color: #5a3d29;
        }
        
        /* 音乐控制按钮 */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(60, 91, 60, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(4px);
            border: 1px solid #c9aa4f;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .music-control:hover {
            transform: scale(1.1);
            background: rgba(60, 91, 60, 1);
        }
        
        .music-control i {
            color: #e9d6a7;
            font-size: 1.2rem;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #f5e8d0;
            background-color: #3c5b3c;
            margin-top: 30px;
            border-top: 1px solid #8b7355;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            .nav-buttons {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .nav-btn {
                width: 80%;
                justify-content: center;
            }
            .poem-container {
                font-size: 1.3rem;
                line-height: 2.4;
            }
            .blank {
                width: 50px;
                height: 50px;
            }
            .bubble {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }
            .music-control {
                width: 36px;
                height: 36px;
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>破阵子·为陈同甫赋壮词以寄之</h1>
            <div class="nav-buttons">
                <a href="主页.html" class="nav-btn"><i class="fas fa-home"></i> 首页</a>
                <a href="#" class="nav-btn"><i class="fas fa-gamepad"></i> 填词</a>
                <a href="翻译.html" class="nav-btn"><i class="fas fa-language"></i> 翻译</a>
                <a href="赏析.html" class="nav-btn"><i class="fas fa-book-open"></i> 赏析</a>
                <a href="典故.html" class="nav-btn"><i class="fas fa-landmark"></i> 典故</a>
            </div>
        </header>
        
        <main class="main-content">
            <section class="poem-section">
                <h2 class="poem-title">辛弃疾</h2>
                <div class="poem-container" id="poemContainer"></div>
            </section>
            
            <section class="bubbles-section">
                <h2 class="poem-title">选择正确的字填入空格</h2>
                <div class="instructions">
                    <p><i class="fas fa-info-circle"></i> 请将下面彩色气泡中的正确汉字拖动到上方诗词的空格中。每个空格只能填一个字，全部填对即可完成游戏。</p>
                </div>
                <div class="bubbles-container" id="bubblesContainer"></div>
            </section>
            
            <div class="message" id="message"></div>
        </main>
        
        <footer>
            <p>古风填词游戏 | 破阵子·为陈同甫赋壮词以寄之 | 离线可用</p>
        </footer>
    </div>

    <!-- 音乐控制按钮 -->
    <div class="music-control" id="musicControl">
        <i class="fas fa-music" id="musicIcon"></i>
    </div>

    <!-- 背景音乐 -->
    <audio id="bgMusic" loop preload="auto" style="display: none;">
        <source src="音乐/游戏背景音乐_耳聆网_[声音ID：44022].mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========= 音效管理（与赛跑游戏完全一致） =========
        const SoundFX = {
            correctAudio: null,
            wrongAudio: null,
            cheerAudio: null,
            bgAudio: null,
            isBgPlaying: false,
            
            init: function() {
                // 初始化答题音效 - 与赛跑游戏相同路径
                this.correctAudio = new Audio();
                this.correctAudio.src = "音乐/对勾，答对——综艺_耳聆网_[声音ID：36966].mp3";
                this.correctAudio.volume = 0.5;
                
                this.wrongAudio = new Audio();
                this.wrongAudio.src = "音乐/错误音效_耳聆网_[声音ID：36278].mp3";
                this.wrongAudio.volume = 0.5;
                
                // 欢呼音效（通关时播放）
                this.cheerAudio = new Audio();
                this.cheerAudio.src = "https://www.soundjay.com/misc/sounds/applause-01.mp3";
                this.cheerAudio.volume = 0.3;
                
                // 背景音乐
                this.bgAudio = document.getElementById('bgMusic');
                if (this.bgAudio) {
                    this.bgAudio.volume = 0.35;
                    this.bgAudio.loop = true;
                    
                    this.bgAudio.addEventListener('play', () => {
                        this.isBgPlaying = true;
                        document.getElementById('musicIcon').className = 'fas fa-music';
                        console.log('🎵 背景音乐播放中');
                    });
                    this.bgAudio.addEventListener('pause', () => {
                        this.isBgPlaying = false;
                        document.getElementById('musicIcon').className = 'fas fa-volume-mute';
                    });
                    this.bgAudio.addEventListener('error', () => {
                        console.log('❌ 背景音乐加载失败，请检查文件路径');
                    });
                    
                    // 强制自动播放
                    const playPromise = this.bgAudio.play();
                    if (playPromise !== undefined) {
                        playPromise.catch(() => {
                            console.log('⚠️ 自动播放被阻止，等待用户点击');
                            const startOnInteraction = () => {
                                this.bgAudio.play().catch(e => console.log('播放失败', e));
                                document.removeEventListener('click', startOnInteraction);
                                document.removeEventListener('touchstart', startOnInteraction);
                            };
                            document.addEventListener('click', startOnInteraction);
                            document.addEventListener('touchstart', startOnInteraction);
                        });
                    }
                }
            },
            
            playCorrect: function() {
                try {
                    this.correctAudio.currentTime = 0;
                    this.correctAudio.play().catch(e => console.log("正确音效播放失败", e));
                } catch(e) {}
            },
            
            playWrong: function() {
                try {
                    this.wrongAudio.currentTime = 0;
                    this.wrongAudio.play().catch(e => console.log("错误音效播放失败", e));
                } catch(e) {}
            },
            
            playCheer: function() {
                try {
                    this.cheerAudio.currentTime = 0;
                    this.cheerAudio.play().catch(e => console.log("欢呼音效播放失败", e));
                } catch(e) {}
            },
            
            toggleBgMusic: function() {
                if (this.isBgPlaying) {
                    this.bgAudio.pause();
                } else {
                    this.bgAudio.play().catch(e => console.log('播放失败', e));
                }
            }
        };

        // 诗词数据
        const poemData = {
            title: "破阵子·为陈同甫赋壮词以寄之",
            author: "辛弃疾",
            lines: [
                "醉里挑灯看剑，梦回吹角连营。",
                "八百里分<blank id='blank1'></blank>下<blank id='blank2'></blank>，五十弦<blank id='blank3'></blank><blank id='blank4'></blank>外声，沙场秋点兵。",
                "马作<blank id='blank5'></blank>卢飞快，弓如<blank id='blank6'></blank><blank id='blank7'></blank>弦惊。",
                "了却君王天下事，赢得生前身后名。可怜白发生！"
            ],
            blanks: [
                { id: "blank1", correct: "麾", color: "#ffab91" },
                { id: "blank2", correct: "炙", color: "#bcabff" },
                { id: "blank3", correct: "翻", color: "#80deea" },
                { id: "blank4", correct: "塞", color: "#c5e1a5" },
                { id: "blank5", correct: "的", color: "#e1bee7" },
                { id: "blank6", correct: "霹", color: "#ffcc80" },
                { id: "blank7", correct: "雳", color: "#90caf9" }
            ]
        };

        // 干扰字
        const distractionChars = ["得", "赛", "帆", "劈", "利", "晦", "至", "麾", "翻", "塞", "的", "霹", "雳", "炙"];

        // 初始化音效
        SoundFX.init();

        // 初始化游戏
        document.addEventListener('DOMContentLoaded', function() {
            initGame();
            setupEventListeners();
        });

        function initGame() {
            const poemContainer = document.getElementById('poemContainer');
            poemContainer.innerHTML = '';
            
            poemData.lines.forEach(line => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'poem-line';
                let processedLine = line;
                poemData.blanks.forEach(blank => {
                    if (line.includes(`<blank id='${blank.id}'></blank>`)) {
                        processedLine = processedLine.replace(
                            `<blank id='${blank.id}'></blank>`, 
                            `<span class="blank" id="${blank.id}" data-correct="${blank.correct}"></span>`
                        );
                    }
                });
                lineDiv.innerHTML = processedLine;
                poemContainer.appendChild(lineDiv);
            });

            const bubblesContainer = document.getElementById('bubblesContainer');
            bubblesContainer.innerHTML = '';
            
            let allChars = [...distractionChars];
            poemData.blanks.forEach(blank => {
                if (!allChars.includes(blank.correct)) allChars.push(blank.correct);
            });
            allChars = shuffleArray(allChars);
            
            allChars.forEach((char, index) => {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = char;
                bubble.draggable = true;
                bubble.id = `bubble-${index}`;
                
                const blankForChar = poemData.blanks.find(b => b.correct === char);
                if (blankForChar) {
                    bubble.style.backgroundColor = blankForChar.color;
                    bubble.dataset.correctFor = blankForChar.id;
                } else {
                    const colors = ['#ffcdd2', '#f8bbd0', '#e1bee7', '#d1c4e9', '#c5cae9', '#bbdefb', '#b3e5fc', '#b2ebf2', '#b2dfdb', '#c8e6c9', '#dcedc8', '#f0f4c3', '#fff9c4', '#ffecb3', '#ffccbc', '#d7ccc8', '#cfd8dc'];
                    bubble.style.backgroundColor = colors[index % colors.length];
                }
                bubblesContainer.appendChild(bubble);
            });
            
            setupDragAndDrop();
        }

        function setupDragAndDrop() {
            const bubbles = document.querySelectorAll('.bubble');
            const blanks = document.querySelectorAll('.blank');
            
            bubbles.forEach(bubble => {
                bubble.addEventListener('dragstart', function(e) {
                    if (this.classList.contains('used')) return;
                    this.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', this.textContent);
                    e.dataTransfer.setData('bubbleId', this.id);
                });
                bubble.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                });
            });
            
            blanks.forEach(blank => {
                blank.addEventListener('dragover', e => e.preventDefault());
                blank.addEventListener('dragenter', function(e) {
                    e.preventDefault();
                    if (!this.textContent) this.style.backgroundColor = 'rgba(139, 115, 85, 0.2)';
                });
                blank.addEventListener('dragleave', function() {
                    if (!this.textContent) this.style.backgroundColor = '';
                });
                blank.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.style.backgroundColor = '';
                    
                    if (this.textContent) {
                        const oldBubbleId = this.dataset.bubbleId;
                        if (oldBubbleId) {
                            const oldBubble = document.getElementById(oldBubbleId);
                            if (oldBubble) {
                                oldBubble.classList.remove('used');
                                oldBubble.style.opacity = '1';
                            }
                        }
                    }
                    
                    const char = e.dataTransfer.getData('text/plain');
                    const bubbleId = e.dataTransfer.getData('bubbleId');
                    const bubble = document.getElementById(bubbleId);
                    if (bubble.classList.contains('used')) return;
                    
                    this.textContent = char;
                    this.dataset.bubbleId = bubbleId;
                    this.classList.add('filled');
                    bubble.classList.add('used');
                    bubble.style.opacity = '0.3';
                    
                    const correctChar = this.dataset.correct;
                    if (char === correctChar) {
                        this.classList.add('correct');
                        this.classList.remove('incorrect');
                        // ✅ 每一空填对 - 播放正确音效
                        SoundFX.playCorrect();
                    } else {
                        this.classList.add('incorrect');
                        this.classList.remove('correct');
                        // ❌ 每一空填错 - 播放错误音效
                        SoundFX.playWrong();
                        showMessage(`"${char}" 不正确，请重新选择`, 'error');
                    }
                    checkCompletion();
                });
            });
        }

        function checkCompletion() {
            const blanks = document.querySelectorAll('.blank');
            let allFilled = true, allCorrect = true;
            blanks.forEach(blank => {
                if (!blank.textContent) allFilled = false;
                else if (!blank.classList.contains('correct')) allCorrect = false;
            });
            
            if (allFilled && allCorrect) {
                showMessage('恭喜你成功了！所有填空都正确！', 'success');
                // 🎉 通关欢呼音效
                SoundFX.playCheer();
            } else if (allFilled) {
                showMessage('所有空已填满，但还有错误，请检查修正。', 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            if (type === 'error') {
                setTimeout(() => messageDiv.style.display = 'none', 3000);
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function setupEventListeners() {
            // 音乐控制按钮
            const musicControl = document.getElementById('musicControl');
            if (musicControl) {
                musicControl.addEventListener('click', function(e) {
                    e.stopPropagation();
                    SoundFX.toggleBgMusic();
                });
            }
            
            // 重置游戏按钮
            const resetBtn = document.createElement('button');
            resetBtn.className = 'nav-btn';
            resetBtn.innerHTML = '<i class="fas fa-redo"></i> 重置游戏';
            resetBtn.style.marginTop = '20px';
            resetBtn.addEventListener('click', function() {
                initGame();
                document.getElementById('message').style.display = 'none';
            });
            document.querySelector('.bubbles-section').appendChild(resetBtn);
        }
    </script>
</body>
</html>
